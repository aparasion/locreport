---
layout: default
---

<article class="page{% if page.wide %} page--wide{% endif %}">
  {% if page.topic %}
    {% include topic-nav.html %}
  {% endif %}

  {% unless page.no_title %}
  <h1>{{ page.title }}</h1>
  {% endunless %}

  <div class="page-content">
    {{ content }}
  </div>

  {% unless page.no_share %}
  {% include social-share.html %}
  {% endunless %}
</article>

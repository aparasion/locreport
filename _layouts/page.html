---
layout: default
---

<article class="page">
  {% if page.topic %}
    {% include topic-nav.html %}
  {% endif %}

  <h1>{{ page.title }}</h1>
  {% if page.published_date %}
  <p class="post-meta">Published {{ page.published_date }}</p>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>

  {% unless page.no_share %}
  {% include social-share.html %}
  {% endunless %}
</article>

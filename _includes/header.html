<header class="site-header">
  <div class="header-shell">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} home">
      <img src="{{ '/assets/images/logolight.png' | relative_url }}"
           alt="{{ site.title }}"
           class="logo-image theme-logo theme-logo--light">
      <img src="{{ '/assets/images/logodark.png' | relative_url }}"
           alt="{{ site.title }}"
           class="logo-image theme-logo theme-logo--dark">
    </a>

    {% include nav.html %}
  </div>
  {% if page.layout == 'post' %}
  <div class="read-progress-bar" id="read-progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Reading progress"></div>
  {% endif %}
</header>

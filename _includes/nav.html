<nav class="site-nav">
  <ul>
    {% for p in site.pages %}
      {% if p.nav == true %}
        <li>
          <a href="{{ p.url | relative_url }}"
             class="{% if p.url == page.url %}active{% endif %}">
             {{ p.title }}
          </a>
        </li>
        <li>
          <button id="theme-toggle" class="theme-toggle">☾</button>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</nav>

- id: emnlp-2026
  name: EMNLP 2026
  organizer: ACL Special Interest Group on Linguistic Data
  start_date: '2026-11-08'
  end_date: '2026-11-12'
  location: TBA
  format: in-person
  category: conference
  url: https://2026.emnlp.org/
  description: The Conference on Empirical Methods in Natural Language Processing
    (EMNLP) is one of the most influential venues in NLP research, with a strong emphasis
    on data-driven approaches to language understanding and generation. EMNLP is where
    major advances in machine translation quality, multilingual models, and low-resource
    language processing are published each year. For translation professionals and
    language technology buyers, EMNLP research directly shapes what production MT
    systems will look like 12–24 months from publication. Coverage of EMNLP findings
    is now part of LocReport's editorial scope.
  tags:
  - EMNLP2026
  - EMNLP
  - NLP
  - machine translation research

- id: neurips-2026
  name: NeurIPS 2026
  organizer: Neural Information Processing Systems Foundation
  start_date: '2026-12-06'
  end_date: '2026-12-12'
  location: Vancouver, Canada
  format: in-person
  category: conference
  url: https://neurips.cc/
  description: The Conference on Neural Information Processing Systems (NeurIPS) is
    the world's leading machine learning research conference, and the venue where many
    of the foundational advances in large language models, multilingual representation
    learning, and AI scaling have been first announced. NeurIPS is relevant to LocReport's
    coverage because decisions made at the model architecture and training data level
    — including how much multilingual data is included, how low-resource languages
    are handled, and what quality benchmarks are targeted — directly determine the
    future of AI-powered translation. LocReport covers NeurIPS findings through a
    language services lens.
  tags:
  - NeurIPS2026
  - NeurIPS
  - AI research
  - language models


- id: ata67
  name: ATA67
  organizer: American Translators Association
  start_date: '2026-10-28'
  end_date: '2026-10-31'
  location: San Francisco, California, USA
  format: in-person
  category: conference
  url: https://www.atanet.org/ata67/
  description: The American Translators Association's 67th Annual Conference (ATA67)
    will take place from October 28 to October 31, 2026, at the Hyatt Regency San
    Francisco in California. As North America's premier professional development event
    for language service providers, the four-day conference is expected to draw around
    1,000 translation and interpreting professionals, company owners, and students
    from around the globe. The event features specialized educational sessions, industry-leading
    speakers, comprehensive networking highlights, and a dedicated Job Fair where
    agency representatives connect directly with recruiting talent. The ATA67 Preview
    Video offers a visual look at the host city and highlights what attendees can
    expect from the upcoming event in San Francisco.
  tags:
  - ATA67
  - ATA

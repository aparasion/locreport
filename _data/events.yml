- id: locworld55
  name: LocWorld55
  organizer: LocWorld
  start_date: '2026-06-09'
  end_date: '2026-06-11'
  location: Dublin, Ireland
  format: in-person
  category: conference
  url: https://locworld.com/events/locworld55-dublin-2026/
  description: Since 2003, LocWorld has served as the language industry's trusted
    global forum, known for organizing independent and high-impact events where enterprise
    clients and localization vendors can connect, collaborate, and conduct business
    in a collaborative, friendly atmosphere. Building on this legacy of outstanding
    networking and dynamic exhibit halls, LocWorld55 Dublin centers on the modern
    challenge of transforming raw artificial intelligence capabilities into culturally
    relevant, trusted human experiences. The event explores how autonomous AI agents
    and multilingual tech stacks are reshaping global enterprise content, offering
    practical insight into navigating the transition from early-stage AI experimentation
    to controlled, scalable workflows. Through highly curated session tracks, the
    conference brings industry leaders together to address agentic orchestration,
    data design, and global business growth, ultimately equipping professionals with
    the strategic tools necessary to balance rapid automation with crucial human judgment.
  tags:
  - LocWorld55
- id: eamt-2026
  name: EAMT 2026
  organizer: European Association for Machine Translation
  start_date: '2026-06-15'
  end_date: '2026-06-18'
  location: Tilburg, Netherlands
  format: in-person
  category: conference
  url: https://eamt2026.org/
  description: The 26th Annual Conference of the European Association for Machine
    Translation (EAMT 2026) will take place from June 15 to June 18, 2026, in Tilburg,
    the Netherlands, hosted by Tilburg University. The event brings together researchers,
    developers, practitioners, and language industry professionals to share cutting-edge
    advancements and practical implementations in machine translation, translation
    memories, and language technology. The program begins on June 15 with specialized
    workshops and tutorials at the MindLabs venue—covering topics like integrating
    LLMs into CAT tools and managing style in generative AI translation—followed by
    the main conference track from June 16 to June 18 at the Schouwburg Concertzaal
    Tilburg.
  tags:
  - EAMT2026

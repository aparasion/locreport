- id: acl-2026
  name: ACL 2026
  organizer: Association for Computational Linguistics
  start_date: '2026-07-27'
  end_date: '2026-08-01'
  location: Vienna, Austria
  format: in-person
  category: conference
  url: https://2026.aclweb.org/
  description: The 64th Annual Meeting of the Association for Computational Linguistics
    (ACL 2026) is the flagship conference of the ACL, the world's premier scientific
    and professional society for people working on computational problems involving
    human language. ACL brings together researchers from academia and industry working
    on machine translation, multilingual NLP, language modeling, and language generation.
    For the language services industry, ACL is essential reading — it is where the
    research underpinning the next generation of translation engines, quality evaluation
    metrics, and multilingual models is first presented and debated. Sessions on low-resource
    languages, MT evaluation, and LLM multilingual benchmarking are directly relevant
    to localization practitioners.
  tags:
  - ACL2026
  - ACL
  - computational linguistics
  - NLP


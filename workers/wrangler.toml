name = "locreport-dispatch"
main = "dispatch-proxy.js"
compatibility_date = "2025-01-01"

# KV namespace for IP-based rate limiting (20 requests / IP / hour).
# Create it once with: wrangler kv namespace create RATE_LIMIT
# Then paste the returned id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = ""  # <-- fill in after running: wrangler kv namespace create RATE_LIMIT

# Secrets — set via CLI, never committed:
#   wrangler secret put GITHUB_PAT   (classic PAT with `workflow` scope)
#   wrangler secret put WORKER_KEY   (random string, also set as WORKER_KEY repo secret)

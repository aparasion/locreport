name: Deploy to Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build site
        env:
          MANUAL_ARTICLE_TOKEN: ${{ secrets.MANUAL_ARTICLE_TOKEN }}
        run: |
          # Inject tokens as base64 so raw PATs never appear in built HTML
          if [ -n "${MANUAL_ARTICLE_TOKEN:-}" ]; then
            ENCODED=$(printf '%s' "${MANUAL_ARTICLE_TOKEN}" | base64 | tr -d '\n')
            echo "manual_article_token_b64: \"${ENCODED}\"" > _config_runtime.yml
            echo "add_event_token_b64: \"${ENCODED}\"" >> _config_runtime.yml
            bundle exec jekyll build --destination _site --config _config.yml,_config_runtime.yml
            rm -f _config_runtime.yml
          else
            bundle exec jekyll build --destination _site
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: locreport
          directory: _site
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

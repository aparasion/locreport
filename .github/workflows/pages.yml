name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build site
        env:
          MANUAL_ARTICLE_TOKEN: ${{ secrets.MANUAL_ARTICLE_TOKEN }}
        run: |
          # Inject MANUAL_ARTICLE_TOKEN as base64 so the raw PAT never appears in built HTML
          if [ -n "${MANUAL_ARTICLE_TOKEN:-}" ]; then
            ENCODED=$(printf '%s' "${MANUAL_ARTICLE_TOKEN}" | base64 | tr -d '\n')
            echo "manual_article_token_b64: \"${ENCODED}\"" > _config_runtime.yml
            bundle exec jekyll build --destination _site --config _config.yml,_config_runtime.yml
            rm -f _config_runtime.yml
          else
            bundle exec jekyll build --destination _site
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

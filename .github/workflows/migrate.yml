name: Migrate Jekyll posts to Supabase

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install migration dependencies
        run: npm install --no-save @supabase/supabase-js gray-matter typescript ts-node

      - name: Run migration
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npx ts-node --skip-project --compiler-options '{"module":"commonjs"}' scripts/migrate-to-supabase.ts

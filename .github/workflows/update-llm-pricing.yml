name: Update LLM Pricing Data

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pyyaml

      - name: Fetch and update LLM pricing
        run: python scripts/update_llm_pricing.py

      - name: Commit and push if prices changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _data/llm_pricing.yml
          if ! git diff --cached --quiet; then
            git commit -m "Update LLM pricing data - $(date +%Y-%m-%d)"
            git push
          else
            echo "No pricing changes to commit"
          fi

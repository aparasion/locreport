name: Backfill Gists

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Posts to process per run (leave blank for all remaining)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser trafilatura openai requests

      - name: Run backfill
        run: |
          if [ -n "${{ github.event.inputs.limit }}" ]; then
            python scripts/backfill_gists.py --limit ${{ github.event.inputs.limit }}
          else
            python scripts/backfill_gists.py
          fi
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Commit and push updated posts
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _posts/
          if ! git diff --cached --quiet; then
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            git commit -m "Backfill ${COUNT} posts with improved gists - $(date +%Y-%m-%d)"
            git push
          else
            echo "No posts were updated"
          fi

name: Tweet Fact Flow

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  tweet:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Post facts to X
        run: |
          curl -f --max-time 60 -X POST https://locreport.com/api/tweet-facts \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

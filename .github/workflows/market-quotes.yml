name: Market Quotes

on:
  schedule:
    - cron: "*/30 0-22 * * 1-5"   # Mon–Fri every 30 min, covers all global exchanges
  workflow_dispatch:                # allow manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-quotes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance requests

      - name: Fetch market quotes
        run: python scripts/update_market_quotes.py

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add assets/data/market_quotes.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: update market quotes $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi

name: Daily Ingest
on:
  schedule:
    - cron: '30 10 * * *'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Run ingest
        run: |
          curl -f --max-time 300 -X POST https://locreport.com/api/ingest \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
